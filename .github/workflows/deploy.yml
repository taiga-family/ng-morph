name: Deploy demo
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: taiga-family/ci/actions/setup/variables@f6c5ae70c94321b87f6fd2ff9bd3a94b60e98828 # v1.203.0
      - uses: taiga-family/ci/actions/setup/node@f6c5ae70c94321b87f6fd2ff9bd3a94b60e98828 # v1.203.0
      - run: npm run build:demo
      - uses: taiga-family/ci/actions/deploy/github-pages@f6c5ae70c94321b87f6fd2ff9bd3a94b60e98828 # v1.203.0
        with:
          token: ${{ secrets.TAIGA_FAMILY_BOT_PAT }}
          folder: dist/apps/demo/browser

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
