name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: taiga-family/ci/actions/setup/variables@6e89be341f2bb8247f26ac563e72344e6c9cf9ad # v1.220.0
      - uses: taiga-family/ci/actions/setup/node@6e89be341f2bb8247f26ac563e72344e6c9cf9ad # v1.220.0
        with:
          audit: true

      - run: |
          if [[ "${{ env.SUPPORT_AUTO_PUSH }}" == "true" ]]; then
              npm run prettier -- --write
              npm run stylelint -- --fix
              npm run lint -- --fix
          else
              npm run prettier -- --check
              npm run stylelint
              npm run lint
          fi

      - run: npm run cspell
      - run: npm run build
      - run: npm run test

      - uses: taiga-family/ci/actions/auto/push@6e89be341f2bb8247f26ac563e72344e6c9cf9ad # v1.220.0
        with:
          token: ${{ secrets.TAIGA_FAMILY_BOT_PAT }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
